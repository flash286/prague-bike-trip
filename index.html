        <title>Берлин → Прага · План</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />

            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Unbounded:wght@700;900&display=swap"
            rel="stylesheet"

        <!-- Leaflet -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        <style>
            :root {
                --bg: #0a0a0f;
                --surface: #0f0f18;
                --border: #1e1e2e;
                --text: #e2e8f0;
                --muted: #64748b;
                --subtle: #475569;
                --green: #4ade80;
                --blue: #60a5fa;
                --orange: #f97316;
                --purple: #e879f9;
                --yellow: #fbbf24;
                --red: #f87171;
                --safe-top: env(safe-area-inset-top, 0px);
                --safe-bottom: env(safe-area-inset-bottom, 0px);
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }
            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "JetBrains Mono", monospace;
                overflow-x: hidden;
            }

            /* iOS safe areas */
            #app {
                min-height: 100vh;
                padding-bottom: calc(80px + var(--safe-bottom));
            }

            /* Header */
            .header {
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(10, 10, 15, 0.92);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--border);
                padding: calc(var(--safe-top) + 16px) 20px 16px;
            }
            .header h1 {
                font-family: "Unbounded", sans-serif;
                font-size: 18px;
                font-weight: 900;
                color: #fff;
                letter-spacing: -0.5px;
            }
            .header p {
                font-size: 10px;
                color: var(--muted);
                margin-top: 3px;
                letter-spacing: 0.06em;
            }

            /* Bottom nav */
            .bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: rgba(10, 10, 15, 0.95);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-top: 1px solid var(--border);
                display: flex;
                padding-bottom: var(--safe-bottom);
            }
            .nav-btn {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 12px 0;
                background: none;
                border: none;
                cursor: pointer;
                color: var(--muted);
                font-family: "JetBrains Mono", monospace;
                font-size: 10px;
                transition: color 0.2s;
            }
            .nav-btn.active {
                color: var(--blue);
            }
            .nav-btn .icon {
                font-size: 20px;
            }

            /* Content */
            .content {
                padding: 16px 16px 0;
                max-width: 600px;
                margin: 0 auto;
            }

            /* Phase tabs */
            .phase-scroll {
                display: flex;
                gap: 8px;
                overflow-x: auto;
                padding: 0 0 12px;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            .phase-scroll::-webkit-scrollbar {
                display: none;
            }
            .phase-btn {
                flex-shrink: 0;
                padding: 7px 14px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: var(--surface);
                color: var(--muted);
                font-family: "JetBrains Mono", monospace;
                font-size: 11px;
                cursor: pointer;
                transition: all 0.15s;
                white-space: nowrap;
            }
            .phase-btn.active {
                font-weight: 700;
            }

            /* Phase header */
            .phase-header {
                padding: 16px;
                border-radius: 12px;
                border: 1px solid transparent;
                border-left-width: 3px;
                margin-bottom: 12px;
                background: var(--surface);
            }
            .phase-header .ph-title {
                font-family: "Unbounded", sans-serif;
                font-size: 16px;
                font-weight: 700;
            }
            .phase-header .ph-focus {
                font-size: 11px;
                color: var(--muted);
                margin-top: 4px;
            }
            .phase-header .ph-km {
                font-size: 22px;
                font-weight: 700;
                text-align: right;
            }
            .phase-header .ph-label {
                font-size: 10px;
                color: var(--muted);
                text-align: right;
            }
            .ph-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            /* Week cards */
            .week-card {
                margin-bottom: 8px;
                border-radius: 12px;
                overflow: hidden;
                border: 1px solid var(--border);
            }
            .week-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 14px 16px;
                background: var(--surface);
                cursor: pointer;
                -webkit-user-select: none;
                user-select: none;
            }
            .week-num {
                width: 28px;
                height: 28px;
                border-radius: 6px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                font-weight: 700;
                margin-right: 12px;
                flex-shrink: 0;
            }
            .week-label {
                font-size: 13px;
                color: var(--text);
            }
            .week-km {
                font-size: 13px;
                font-weight: 600;
                margin-right: 10px;
            }
            .week-chevron {
                font-size: 14px;
                color: var(--subtle);
                transition: transform 0.2s;
            }
            .week-chevron.open {
                transform: rotate(180deg);
            }
            .week-left {
                display: flex;
                align-items: center;
            }
            .week-right {
                display: flex;
                align-items: center;
            }

            /* Day rows */
            .week-body {
                background: #09090e;
                border-top: 1px solid var(--border);
            }
            .day-row {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                padding: 10px 14px;
                border-bottom: 1px solid #111;
                gap: 10px;
            }
            .day-row:last-child {
                border-bottom: none;
            }
            .day-label {
                font-size: 11px;
                color: var(--muted);
                min-width: 55px;
                padding-top: 2px;
                flex-shrink: 0;
            }
            .day-info {
                flex: 1;
            }
            .day-name {
                font-size: 12px;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
            }
            .type-badge {
                font-size: 9px;
                padding: 2px 6px;
                border-radius: 4px;
                background: #1e293b;
                color: #94a3b8;
                border: 1px solid #2a2a3a;
            }
            .day-note {
                font-size: 11px;
                color: var(--muted);
                margin-top: 3px;
            }
            .day-km {
                font-size: 13px;
                font-weight: 600;
                white-space: nowrap;
                flex-shrink: 0;
            }

            /* Tip */
            .week-tip {
                padding: 10px 14px;
                font-size: 11px;
                color: #94a3b8;
                font-style: italic;
                border-top: 1px solid #111;
            }

            /* Exercise cards */
            .ex-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 14px;
                margin-bottom: 10px;
            }
            .ex-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 10px;
            }
            .ex-left {
                flex: 1;
            }
            .ex-icon-name {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 6px;
                flex-wrap: wrap;
            }
            .ex-icon {
                font-size: 20px;
            }
            .ex-name {
                font-size: 13px;
                font-weight: 700;
                color: var(--text);
            }
            .ex-equip {
                font-size: 10px;
                padding: 2px 7px;
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 4px;
                color: #94a3b8;
            }
            .ex-tip {
                font-size: 11px;
                color: var(--muted);
                margin-bottom: 4px;
                line-height: 1.5;
            }
            .ex-prog {
                font-size: 10px;
                color: var(--subtle);
                font-style: italic;
            }
            .ex-right {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 8px;
                min-width: 100px;
            }
            .ex-sets {
                font-size: 11px;
                color: var(--blue);
                text-align: right;
            }
            .yt-btn {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                background: #1a0a0a;
                border: 1px solid #991b1b;
                border-radius: 6px;
                padding: 6px 10px;
                color: var(--red);
                font-size: 11px;
                text-decoration: none;
                font-family: "JetBrains Mono", monospace;
                white-space: nowrap;
                -webkit-touch-callout: default;
            }

            /* Back protocol */
            .back-section {
                margin-top: 20px;
                margin-bottom: 16px;
            }
            .back-toggle {
                width: 100%;
                background: var(--surface);
                border: 1px solid rgba(127, 29, 29, 0.4);
                border-radius: 12px;
                padding: 14px 16px;
                cursor: pointer;
                display: flex;
                justify-content: space-between;
                align-items: center;
                color: #fca5a5;
                font-family: "JetBrains Mono", monospace;
                font-size: 12px;
                text-align: left;
            }
            .back-toggle .chevron {
                font-size: 14px;
                color: var(--subtle);
                transition: transform 0.2s;
            }
            .back-toggle .chevron.open {
                transform: rotate(180deg);
            }
            .back-body {
                background: #09090e;
                border: 1px solid rgba(127, 29, 29, 0.3);
                border-top: none;
                border-radius: 0 0 12px 12px;
                padding: 10px 12px;
            }
            .back-tip {
                padding: 8px 10px;
                margin-bottom: 6px;
                background: var(--surface);
                border-radius: 8px;
                border: 1px solid var(--border);
                font-size: 11px;
                color: #94a3b8;
                line-height: 1.6;
            }
            .back-tip:last-child {
                margin-bottom: 0;
            }

            /* Progress bar */
            .progress-section {
                margin: 20px 0 16px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 16px;
            }
            .progress-label {
                font-size: 10px;
                color: var(--muted);
                margin-bottom: 12px;
                letter-spacing: 0.06em;
            }
            .bar-container {
                display: flex;
                gap: 3px;
                align-items: flex-end;
                height: 80px;
            }
            .bar {
                flex: 1;
                border-radius: 2px;
            }
            .month-labels {
                display: flex;
                justify-content: space-between;
                margin-top: 6px;
                font-size: 10px;
                color: #374151;
            }

            /* Offline banner */
            #offline-banner {
                display: none;
                position: fixed;
                top: calc(var(--safe-top) + 60px);
                left: 16px;
                right: 16px;
                background: #7f1d1d;
                color: #fca5a5;
                font-size: 11px;
                padding: 10px 14px;
                border-radius: 8px;
                text-align: center;
                z-index: 200;
            }

            /* Add to home screen hint */
            .install-hint {
                margin: 0 0 16px;
                padding: 12px 14px;
                background: #0d1117;
                border: 1px solid #1e3a5f;
                border-left: 3px solid var(--blue);
                border-radius: 10px;
                font-size: 11px;
                color: #64748b;
                line-height: 1.6;
                display: none;
            }
            .install-hint b {
                color: #93c5fd;
            }
            .install-hint.show {
                display: block;
            }

            /* Animations */
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .fade-in {
                animation: fadeIn 0.25s ease;
            }

            /* Day checkbox */
            .day-check {
                position: relative;
                width: 22px;
                height: 22px;
                flex-shrink: 0;
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
            }
            .day-check input {
                position: absolute;
                opacity: 0;
                width: 100%;
                height: 100%;
                cursor: pointer;
                margin: 0;
                z-index: 2;
            }
            .day-check .checkmark {
                position: absolute;
                inset: 0;
                border-radius: 6px;
                border: 1.5px solid var(--border);
                background: transparent;
                transition: all 0.15s;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .day-check .checkmark::after {
                content: '';
                display: none;
                width: 10px;
                height: 10px;
                border-radius: 3px;
            }
            .day-check input:checked + .checkmark {
                border-color: var(--green);
                background: rgba(74, 222, 128, 0.15);
            }
            .day-check input:checked + .checkmark::after {
                display: block;
                content: '✓';
                font-size: 14px;
                color: var(--green);
                width: auto;
                height: auto;
                background: none;
            }
            .day-row.completed .day-name,
            .day-row.completed .day-km,
            .day-row.completed .day-note,
            .day-row.completed .day-label {
                opacity: 0.45;
                text-decoration: line-through;
                text-decoration-color: var(--subtle);
            }

            /* Week progress */
            .week-progress {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-right: 10px;
            }
            .week-progress-bar {
                width: 36px;
                height: 4px;
                border-radius: 2px;
                background: var(--border);
                overflow: hidden;
            }
            .week-progress-fill {
                height: 100%;
                border-radius: 2px;
                background: var(--green);
                transition: width 0.3s;
            }
            .week-progress-text {
                font-size: 9px;
                color: var(--muted);
                min-width: 24px;
                text-align: right;
            }
            .week-card.all-done {
                border-color: rgba(74, 222, 128, 0.3);
            }
            .week-card.all-done .week-header {
                background: rgba(74, 222, 128, 0.05);
            }

            /* Phase progress badge */
            .phase-progress {
                font-size: 9px;
                opacity: 0.7;
            }

            /* Touch feedback */
            .week-header:active,
            .phase-btn:active,
            .back-toggle:active,
            .nav-btn:active {
                opacity: 0.7;
            }

            /* HR tab */
            .hr-hero {
                background: linear-gradient(135deg, #1a0a0a 0%, #0d0a1a 100%);
                border: 1px solid #3f1f1f;
                border-radius: 12px;
                padding: 20px;
                margin-bottom: 14px;
                text-align: center;
            }
            .hr-hero-bpm {
                font-family: "Unbounded", sans-serif;
                font-size: 48px;
                font-weight: 900;
                color: #f87171;
                line-height: 1;
            }
            .hr-hero-label {
                font-size: 10px;
                color: #64748b;
                margin-top: 4px;
                letter-spacing: 0.08em;
            }
            .hr-hero-sub {
                font-size: 11px;
                color: #475569;
                margin-top: 12px;
            }
            .hr-zones {
                margin-bottom: 14px;
            }
            .hr-zone {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 14px;
                margin-bottom: 6px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                border-left-width: 3px;
            }
            .hz-num {
                font-size: 11px;
                font-weight: 700;
                min-width: 20px;
            }
            .hz-info {
                flex: 1;
            }
            .hz-name {
                font-size: 12px;
                color: var(--text);
                font-weight: 500;
            }
            .hz-use {
                font-size: 10px;
                color: var(--muted);
                margin-top: 2px;
            }
            .hz-range {
                font-size: 14px;
                font-weight: 700;
                white-space: nowrap;
            }
            .hr-tip-box {
                background: #0d1117;
                border: 1px solid #1e3a5f;
                border-left: 3px solid #60a5fa;
                border-radius: 10px;
                padding: 14px;
                margin-bottom: 14px;
                font-size: 11px;
                color: #64748b;
                line-height: 1.7;
            }
            .hr-tip-box b {
                color: #93c5fd;
            }
            /* HR badge in day rows */
            .hr-badge {
                font-size: 9px;
                padding: 1px 6px;
                border-radius: 4px;
                font-weight: 600;
                white-space: nowrap;
            }

            /* Splash screen */
            #splash {
                position: fixed;
                inset: 0;
                z-index: 999;
                background: #0a0a0f;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transition:
                    opacity 0.5s ease,
                    transform 0.5s ease;
            }
            #splash.hide {
                opacity: 0;
                transform: scale(1.04);
                pointer-events: none;
            }
            .splash-icon {
                font-size: 72px;
                margin-bottom: 28px;
                animation: splashBike 1s ease-in-out infinite alternate;
            }
            @keyframes splashBike {
                from {
                    transform: translateX(-10px);
                }
                to {
                    transform: translateX(10px);
                }
            }
            .splash-title {
                font-family: "Unbounded", sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                letter-spacing: -0.5px;
                margin-bottom: 6px;
                text-align: center;
            }
            .splash-sub {
                font-size: 11px;
                color: #475569;
                letter-spacing: 0.08em;
                text-align: center;
                margin-bottom: 48px;
            }
            .splash-bar-wrap {
                width: 140px;
                height: 2px;
                background: #1e1e2e;
                border-radius: 2px;
                overflow: hidden;
            }
            .splash-bar {
                height: 100%;
                width: 0;
                border-radius: 2px;
                background: linear-gradient(
                    90deg,
                    #4ade80,
                    #60a5fa,
                    #f97316,
                    #e879f9
                );
                animation: splashLoad 1.4s ease-in-out forwards;
            }
            @keyframes splashLoad {
                0% {
                    width: 0%;
                }
                60% {
                    width: 80%;
                }
                100% {
                    width: 100%;
                }
            }
            .splash-route {
                margin-top: 20px;
                font-size: 11px;
                color: #334155;
                letter-spacing: 0.1em;
            }

            /* Route tab */
            #route-map {
                width: 100%;
                height: 320px;
                border-radius: 12px;
                border: 1px solid var(--border);
                overflow: hidden;
                z-index: 1;
            }
            .route-stats {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
                margin-bottom: 14px;
            }
            .route-stat {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 12px;
                text-align: center;
            }
            .route-stat-val {
                font-family: "Unbounded", sans-serif;
                font-size: 18px;
                font-weight: 700;
                color: #fff;
            }
            .route-stat-label {
                font-size: 10px;
                color: var(--muted);
                margin-top: 2px;
            }
            .elevation-chart {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 14px;
                margin-top: 14px;
            }
            .elevation-chart h3 {
                font-size: 12px;
                color: var(--muted);
                margin-bottom: 10px;
                letter-spacing: 0.06em;
            }
            .elev-svg {
                width: 100%;
                height: 100px;
            }
            .waypoint-list {
                margin-top: 14px;
            }
            .waypoint-item {

            let expandedWeek = null;
            let showBack = false;
            let isStandalone = window.navigator.standalone === true;

            // Progress tracking with localStorage
            const STORAGE_KEY = 'berlin-prague-progress';

            function loadProgress() {
                try {
                    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
                } catch { return {}; }
            }

            function saveProgress(data) {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
            }

            let progress = loadProgress();

            function toggleDay(weekNum, dayIdx) {
                const key = `w${weekNum}_d${dayIdx}`;
                if (progress[key]) { delete progress[key]; }
                else { progress[key] = Date.now(); }
                saveProgress(progress);
                render();
            }

            function isDayDone(weekNum, dayIdx) {
                return !!progress[`w${weekNum}_d${dayIdx}`];
            }

            function weekProgress(week) {
                let done = 0;
                week.days.forEach((_, i) => { if (isDayDone(week.num, i)) done++; });
                return { done, total: week.days.length };
            }

            function phaseProgress(phase) {
                let done = 0, total = 0;
                phase.weeks.forEach(w => {
                    const p = weekProgress(w);
                    done += p.done;
                    total += p.total;
                });
                return { done, total };
            }

            function showTab(tab) {
                activeTab = tab;
                document
                    .querySelectorAll(".nav-btn")
                    .forEach((b) => b.classList.remove("active"));
                document.getElementById("tab-" + tab).classList.add("active");
                expandedWeek = null;
                render();
            }

            const HR_ZONES = [
                {
                    num: 1,
                    name: "Восстановление",
                    use: "Разминка, заминка",

                {

                {
                    num: 3,
                    name: "Темп",
                    use: "Средние выезды (май+)",
                    range: "143–154",

                {

                    name: "Порог",
                    use: "Темповые выезды (июль)",

                    color: "#e879f9",
                },

            const HR_BY_TYPE = {
                easy: {

                    color: "#60a5fa",

                medium: {
                    label: "З2–З3 · 131–154",

                    color: "#f97316",
                },
                long: {
                    label: "З2 · 131–143",
                    bg: "#1e3a5f",
                    color: "#60a5fa",
                },
            };

            function setPhase(i) {
                activePhase = i;
                expandedWeek = null;
                render();
            }

            function toggleWeek(i) {
                expandedWeek = expandedWeek === i ? null : i;
                render();
            }

            function toggleBack() {
                showBack = !showBack;
                render();
            }

            function render() {
                const el = document.getElementById("main-content");
                el.className = "content fade-in";
                void el.offsetWidth; // reflow for animation

                if (activeTab === "plan") {
                    el.innerHTML = renderPlan();
                } else if (activeTab === "exercises") {
                    el.innerHTML = renderExercises();
                } else if (activeTab === "route") {
                    el.innerHTML = renderRoute();
                    initMap();
                } else {
                    el.innerHTML = renderHR();
                }
            }

            function renderPlan() {
                const phase = PHASES[activePhase];
                const phaseButtons = PHASES.map(
                    (p, i) => {
                        const pp = phaseProgress(p);
                        const pctText = pp.total > 0 && pp.done > 0 ? ` · ${Math.round(pp.done / pp.total * 100)}%` : '';
                        return `
    <button class="phase-btn ${i === activePhase ? "active" : ""}"
      style="${i === activePhase ? `background:${p.color}20;border-color:${p.color};color:${p.color}` : ""}"
      onclick="setPhase(${i})">${p.name} · ${p.period}<span class="phase-progress">${pctText}</span></button>
  `;
                    },
                ).join("");

                const weeks = phase.weeks
                    .map((week, wi) => {
                        const isOpen = expandedWeek === wi;
                        const days = isOpen
                            ? week.days
                                  .map((d, di) => {
                                      const hr =
                                          HR_BY_TYPE[d.type] || HR_BY_TYPE.easy;
                                      const done = isDayDone(week.num, di);
                                      return `
      <div class="day-row ${done ? 'completed' : ''}">
        <label class="day-check" onclick="event.stopPropagation()">
          <input type="checkbox" ${done ? 'checked' : ''} onchange="toggleDay(${week.num}, ${di})">

        </label>
        <span class="day-label">${d.day}</span>
        <div class="day-info">
          <div class="day-name">${d.label}

            <span class="hr-badge" style="background:${hr.bg};color:${hr.color}">❤️ ${hr.label}</span>
          </div>
          ${d.note ? `<div class="day-note">${d.note}</div>` : ""}
        </div>
        <span class="day-km" style="color:${phase.color}">${d.km}</span>
      </div>
    `;
                                  })
                                  .join("")
                            : "";
                        const tip =
                            isOpen && week.tip
                                ? `<div class="week-tip" style="background:${phase.color}10;border-top:1px solid ${phase.color}20">💡 ${week.tip}</div>`
                                : "";
                        const wp = weekProgress(week);
                        const wpPct = wp.total > 0 ? Math.round(wp.done / wp.total * 100) : 0;
                        const allDone = wp.done === wp.total;
                        return `
      <div class="week-card ${allDone ? 'all-done' : ''}">
        <div class="week-header" onclick="toggleWeek(${wi})">
          <div class="week-left">
            <div class="week-num" style="background:${allDone ? 'rgba(74,222,128,0.2)' : phase.color + '20'};border:1px solid ${allDone ? 'rgba(74,222,128,0.5)' : phase.color + '50'};color:${allDone ? '#4ade80' : phase.color}">${allDone ? '✓' : week.num}</div>
            <span class="week-label">Неделя ${week.num}</span>
          </div>
          <div class="week-right">
            ${wp.done > 0 ? `<div class="week-progress">
              <div class="week-progress-bar"><div class="week-progress-fill" style="width:${wpPct}%"></div></div>
              <span class="week-progress-text">${wp.done}/${wp.total}</span>
            </div>` : ''}
            <span class="week-km" style="color:${phase.color}">${week.total} км</span>
            <span class="week-chevron ${isOpen ? "open" : ""}">▾</span>
          </div>
        </div>
        ${isOpen ? `<div class="week-body">${days}${tip}</div>` : ""}
      </div>
    `;
                    })
                    .join("");

                const backBody = showBack
                    ? `
    <div class="back-body">
      ${BACK_TIPS.map((t) => `<div class="back-tip">${t}</div>`).join("")}
    </div>
  `
                    : "";

                const bars = WEEK_KMS.map(
                    (km, i) => `
    <div class="bar" style="height:${Math.max(4, km / 2.5)}px;background:${PHASE_COLORS[i]};opacity:${0.5 + i / 36}"></div>
  `,
                ).join("");

                return `
    <div class="phase-scroll">${phaseButtons}</div>

    <div class="phase-header" style="border-color:${phase.color}30;border-left-color:${phase.color}">
      <div class="ph-row">
        <div>
          <div class="ph-title" style="color:${phase.color}">${phase.name}: ${phase.subtitle}</div>
          <div class="ph-focus">Фокус: ${phase.focus}</div>
        </div>
        <div>
          <div class="ph-label">ЦЕЛЬ НЕДЕЛИ</div>
          <div class="ph-km" style="color:${phase.color}">${phase.weeklyKm}</div>
        </div>
      </div>
    </div>

    ${weeks}

    <div class="back-section">
      <button class="back-toggle" onclick="toggleBack()" style="border-radius:${showBack ? "12px 12px 0 0" : "12px"}">
        <span>⚠️ Протокол: боль в спине</span>
        <span class="chevron ${showBack ? "open" : ""}">▾</span>
      </button>
      ${backBody}
    </div>

    <div class="progress-section">
      <div class="progress-label">ПРОГРЕСС К СТАРТУ</div>
      ${(() => {
        let totalDone = 0, totalAll = 0;
        PHASES.forEach(p => { const pp = phaseProgress(p); totalDone += pp.done; totalAll += pp.total; });
        const pct = totalAll > 0 ? Math.round(totalDone / totalAll * 100) : 0;
        return totalDone > 0 ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div style="flex:1;height:6px;border-radius:3px;background:var(--border);overflow:hidden">
            <div style="height:100%;width:${pct}%;border-radius:3px;background:var(--green);transition:width 0.3s"></div>
          </div>
          <span style="font-size:13px;font-weight:700;color:var(--green)">${pct}%</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Выполнено тренировок: ${totalDone} из ${totalAll}</div>` : '';
      })()}
      <div class="bar-container">${bars}</div>
      <div class="month-labels"><span>АПР</span><span>МАЙ</span><span>ИЮН</span><span>ИЮЛ</span><span>АВГ</span></div>
    </div>
  `;
            }

            function renderHR() {
                const zones = HR_ZONES.map(
                    (z) => `
    <div class="hr-zone" style="border-left-color:${z.color}">
      <div class="hz-num" style="color:${z.color}">З${z.num}</div>
      <div class="hz-info">
        <div class="hz-name">${z.name}</div>
        <div class="hz-use">${z.use}</div>

  `,
                ).join("");

                return `
    <div class="hr-hero">
      <div style="font-size:11px;color:#64748b;letter-spacing:0.08em;margin-bottom:8px">ТВОИ ДАННЫЕ ИЗ APPLE HEALTH</div>
      <div style="display:flex;justify-content:center;gap:32px;margin-bottom:12px">
        <div>
          <div class="hr-hero-bpm" style="font-size:36px">62</div>
          <div class="hr-hero-label">ПУЛЬС ПОКОЯ</div>
        </div>
        <div style="width:1px;background:#2a1a1a"></div>
        <div>
          <div class="hr-hero-bpm" style="font-size:36px">177</div>

        </div>
      </div>
      <div class="hr-hero-sub">Формула Карвонена · Пульсовой резерв: 115 уд/мин</div>
    </div>

    <div class="hr-tip-box">
      🎯 <b>Главное правило похода:</b> держи <b>Зону 2 (131–143)</b> на всех длинных и лёгких выездах. Если можешь говорить полными предложениями — ты в правильной зоне. Если нет — сбавляй.<br><br>
      📈 <b>Почему это важно:</b> аэробная база строится именно в З2. Большинство любителей едут слишком быстро и не прогрессируют — не делай эту ошибку.
    </div>

    <div style="font-size:10px;color:#475569;letter-spacing:0.08em;margin-bottom:10px">ЗОНЫ ПУЛЬСА</div>
    <div class="hr-zones">${zones}</div>

    <div class="hr-tip-box" style="border-color:#f97316;border-left-color:#f97316">
      ⚠️ <b style="color:#fb923c">Сейчас пульс покоя ~84</b> — выше нормы. Это временно после лыж и накопленной усталости. Ориентируйся на базовые 62 для расчёта зон. С началом тренировок вернётся к норме.
    </div>
  `;
            }

            function renderExercises() {
                const installHint = !isStandalone
                    ? `
    <div class="install-hint show">
      📱 <b>Сохрани на Home Screen:</b> в Safari нажми кнопку «Поделиться» → «На экран Домой»
    </div>
  `
                    : "";

                const cards = EXERCISES.map(
                    (ex) => `
    <div class="ex-card">
      <div class="ex-header">
        <div class="ex-left">
          <div class="ex-icon-name">

                ).join("");

                return `
    ${installHint}
    <div style="margin-bottom:14px;padding:12px 14px;background:#0d1117;border:1px solid #1e3a5f;border-radius:10px;font-size:11px;color:#64748b">
      ⏱ <b style="color:#93c5fd">15 минут</b> · 3 раза в неделю · в дни велопоездок · без спортзала
    </div>
    ${cards}
    <div style="margin-bottom:16px;padding:14px;background:#0d1117;border:1px solid #f97316;border-left:3px solid #f97316;border-radius:10px;font-size:11px;color:#94a3b8">
      🥊 <b style="color:#fb923c">Боксёрские перчатки</b> — не для подготовки к Праге, но отличное кардио в дождливый день.
    </div>
  `;
            }

            // Offline detection
            window.addEventListener("online", () => {
                document.getElementById("offline-banner").style.display =
                    "none";
            });
            window.addEventListener("offline", () => {
                document.getElementById("offline-banner").style.display =
                    "block";
            });

            // Service Worker registration
            if ("serviceWorker" in navigator) {
                const swCode = `
const CACHE = 'berlin-prague-v2';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])).catch(() => {}));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
    const clone = res.clone();
    caches.open(CACHE).then(c => c.put(e.request, clone));
    return res;
  }).catch(() => caches.match('./'))));
});
  `;
                const blob = new Blob([swCode], {
                    type: "application/javascript",
                });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(() => {});
            }

            // Route waypoints — Berlin → Prague via EuroVelo 7
            const ROUTE_WAYPOINTS = [
                { name: "Берлин", sub: "Старт · Alexanderplatz", lat: 52.5200, lng: 13.4050, km: 0, elev: 34 },
                { name: "Людвигсфельде", sub: "Выезд из Берлина", lat: 52.3010, lng: 13.2540, km: 28, elev: 42 },
                { name: "Барут", sub: "Бранденбург", lat: 52.0520, lng: 13.5030, km: 55, elev: 48 },
                { name: "Люббенау", sub: "Шпреевальд · Каналы", lat: 51.8660, lng: 13.9570, km: 95, elev: 52 },
                { name: "Коттбус", sub: "Отдых · инфраструктура", lat: 51.7600, lng: 14.3340, km: 125, elev: 68 },
                { name: "Шпремберг", sub: "Шпрее", lat: 51.5720, lng: 14.3710, km: 150, elev: 105 },
                { name: "Хойерсверда", sub: "Верхняя Лужица", lat: 51.4340, lng: 14.2360, km: 180, elev: 118 },
                { name: "Баутцен", sub: "Саксония · крепость", lat: 51.1810, lng: 14.4240, km: 215, elev: 204 },
                { name: "Циттау", sub: "Трёхстранный уголок", lat: 50.8990, lng: 14.8060, km: 260, elev: 242 },
                { name: "Либерец", sub: "Чехия · горы Йизера", lat: 50.7671, lng: 15.0562, km: 285, elev: 374 },
                { name: "Турнов", sub: "Чешский Рай", lat: 50.5870, lng: 15.1530, km: 305, elev: 265 },
                { name: "Мельник", sub: "Слияние Влтавы и Лабы", lat: 50.3510, lng: 14.4730, km: 320, elev: 175 },
                { name: "Прага", sub: "Финиш · Карлов мост", lat: 50.0755, lng: 14.4378, km: 335, elev: 190 },
            ];

            // Elevation profile data points (simplified)
            const ELEV_PROFILE = [
                { km: 0, elev: 34 }, { km: 20, elev: 38 }, { km: 40, elev: 45 },
                { km: 60, elev: 50 }, { km: 80, elev: 48 }, { km: 100, elev: 55 },
                { km: 120, elev: 65 }, { km: 140, elev: 85 }, { km: 160, elev: 110 },
                { km: 180, elev: 118 }, { km: 200, elev: 170 }, { km: 215, elev: 204 },
                { km: 230, elev: 230 }, { km: 250, elev: 280 }, { km: 265, elev: 374 },
                { km: 280, elev: 340 }, { km: 295, elev: 265 }, { km: 310, elev: 210 },
                { km: 320, elev: 175 }, { km: 335, elev: 190 },
            ];

            let routeMap = null;

            function renderRoute() {
                const maxElev = Math.max(...ELEV_PROFILE.map(p => p.elev));
                const totalKm = 335;
                const svgW = 100;
                const svgH = 100;

                // Build SVG path for elevation
                const points = ELEV_PROFILE.map(p => {
                    const x = (p.km / totalKm) * svgW;
                    const y = svgH - (p.elev / (maxElev + 30)) * svgH;
                    return `${x},${y}`;
                });
                const linePath = `M${points.join(' L')}`;
                const areaPath = `${linePath} L${svgW},${svgH} L0,${svgH} Z`;

                const waypoints = ROUTE_WAYPOINTS.map((wp, i) => {
                    const isStart = i === 0;
                    const isEnd = i === ROUTE_WAYPOINTS.length - 1;
                    const color = isStart ? 'var(--green)' : isEnd ? 'var(--orange)' : 'var(--blue)';
                    return `
                        <div class="waypoint-item">
                            <div class="waypoint-dot" style="background:${color};${isStart || isEnd ? 'width:12px;height:12px;' : ''}"></div>
                            <div class="waypoint-info">
                                <div class="waypoint-name">${wp.name}</div>
                                <div class="waypoint-detail">${wp.sub} · ${wp.elev} м</div>
                            </div>
                            <div class="waypoint-km">${wp.km} км</div>
                        </div>`;
                }).join('');

                return `
                    <div class="route-stats">
                        <div class="route-stat">
                            <div class="route-stat-val" style="color:var(--green)">335</div>
                            <div class="route-stat-label">КМ</div>
                        </div>
                        <div class="route-stat">
                            <div class="route-stat-val" style="color:var(--blue)">3–4</div>
                            <div class="route-stat-label">ДНЯ</div>
                        </div>
                        <div class="route-stat">
                            <div class="route-stat-val" style="color:var(--orange)">374</div>
                            <div class="route-stat-label">МАКС М</div>
                        </div>
                    </div>

                    <div id="route-map"></div>

                    <div class="elevation-chart">
                        <h3>ВЫСОТНЫЙ ПРОФИЛЬ</h3>
                        <svg class="elev-svg" viewBox="0 0 ${svgW} ${svgH}" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="elev-grad" x1="0" y1="0" x2="1" y2="0">
                                    <stop offset="0%" stop-color="#4ade80" />
                                    <stop offset="50%" stop-color="#60a5fa" />
                                    <stop offset="100%" stop-color="#f97316" />
                                </linearGradient>
                                <linearGradient id="elev-fill" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stop-color="rgba(96,165,250,0.3)" />
                                    <stop offset="100%" stop-color="rgba(96,165,250,0)" />
                                </linearGradient>
                            </defs>
                            <path d="${areaPath}" fill="url(#elev-fill)" />
                            <path d="${linePath}" fill="none" stroke="url(#elev-grad)" stroke-width="1.5" vector-effect="non-scaling-stroke" />
                        </svg>
                        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--subtle);margin-top:4px">
                            <span>Берлин 34м</span>
                            <span>Либерец 374м</span>
                            <span>Прага 190м</span>
                        </div>
                    </div>

                    <div class="route-section-title">КЛЮЧЕВЫЕ ТОЧКИ МАРШРУТА</div>
                    <div class="waypoint-list">${waypoints}</div>

                    <a href="https://www.komoot.com/plan/@51.3,14.0,8z" target="_blank" rel="noopener" class="komoot-btn">
                        🧭 Спланировать на Komoot
                    </a>
                    <div style="text-align:center;font-size:10px;color:var(--subtle);margin:8px 0 20px">
                        Откроет планировщик маршрутов Komoot для Berlin → Prague
                    </div>
                `;
            }

            function initMap() {
                if (routeMap) {
                    routeMap.remove();
                    routeMap = null;
                }
                const mapEl = document.getElementById('route-map');
                if (!mapEl || typeof L === 'undefined') return;

                routeMap = L.map('route-map', {
                    zoomControl: false,
                    attributionControl: false,
                }).setView([51.3, 14.0], 7);

                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 17,
                }).addTo(routeMap);

                // Draw route polyline
                const coords = ROUTE_WAYPOINTS.map(w => [w.lat, w.lng]);
                L.polyline(coords, {
                    color: '#60a5fa',
                    weight: 3,
                    opacity: 0.8,
                    smoothFactor: 1.5,
                }).addTo(routeMap);

                // Add markers
                ROUTE_WAYPOINTS.forEach((wp, i) => {
                    const isStart = i === 0;
                    const isEnd = i === ROUTE_WAYPOINTS.length - 1;
                    const size = isStart || isEnd ? 12 : 7;
                    const color = isStart ? '#4ade80' : isEnd ? '#f97316' : '#60a5fa';

                    const icon = L.divIcon({
                        className: '',
                        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid ${color}40;box-shadow:0 0 6px ${color}60"></div>`,
                        iconSize: [size, size],
                        iconAnchor: [size / 2, size / 2],
                    });

                    L.marker([wp.lat, wp.lng], { icon })
                        .bindPopup(`<b>${wp.name}</b><br>${wp.sub}<br>${wp.km} км · ${wp.elev} м`, {
                            className: 'route-popup',
                        })
                        .addTo(routeMap);
                });

                // Fit bounds
                routeMap.fitBounds(coords, { padding: [20, 20] });

                // Attribution
                L.control.attribution({ position: 'bottomright', prefix: false })
                    .addAttribution('© <a href="https://carto.com">CARTO</a> © <a href="https://osm.org">OSM</a>')
                    .addTo(routeMap);
            }

            // Initial render
            render();

            // Splash screen — hide after 1.6s
            setTimeout(() => {
                const splash = document.getElementById("splash");
                if (splash) {
                    splash.classList.add("hide");
                    setTimeout(() => splash.remove(), 500);
                }
            }, 1600);
        </script>
    </body>
</html>
