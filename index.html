        <style>
            :root {
                --bg: #0a0a0f;
                --surface: #0f0f18;
                --border: #1e1e2e;
                --text: #e2e8f0;
                --muted: #64748b;
                --subtle: #475569;
                --green: #4ade80;
                --blue: #60a5fa;
                --orange: #f97316;
                --purple: #e879f9;
                --yellow: #fbbf24;
                --red: #f87171;
                --safe-top: env(safe-area-inset-top, 0px);
                --safe-bottom: env(safe-area-inset-bottom, 0px);
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                -webkit-tap-highlight-color: transparent;
            }
            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "JetBrains Mono", monospace;
                overflow-x: hidden;
            }

            /* iOS safe areas */
            #app {
                min-height: 100vh;
                padding-bottom: calc(80px + var(--safe-bottom));
            }

            /* Header */
            .header {
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(10, 10, 15, 0.92);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--border);
                padding: calc(var(--safe-top) + 16px) 20px 16px;
            }
            .header h1 {
                font-family: "Unbounded", sans-serif;
                font-size: 18px;
                font-weight: 900;
                color: #fff;
                letter-spacing: -0.5px;
            }
            .header p {
                font-size: 10px;
                color: var(--muted);
                margin-top: 3px;
                letter-spacing: 0.06em;
            }

            /* Bottom nav */
            .bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
                background: rgba(10, 10, 15, 0.95);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-top: 1px solid var(--border);
                display: flex;
                padding-bottom: var(--safe-bottom);
            }
            .nav-btn {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 12px 0;
                background: none;
                border: none;
                cursor: pointer;
                color: var(--muted);
                font-family: "JetBrains Mono", monospace;
                font-size: 10px;
                transition: color 0.2s;
            }
            .nav-btn.active {
                color: var(--blue);
            }
            .nav-btn .icon {
                font-size: 20px;
            }

            /* Content */
            .content {
                padding: 16px 16px 0;
                max-width: 600px;
                margin: 0 auto;
            }

            /* Phase tabs */
            .phase-scroll {
                display: flex;
                gap: 8px;
                overflow-x: auto;
                padding: 0 0 12px;
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            .phase-scroll::-webkit-scrollbar {
                display: none;
            }
            .phase-btn {
                flex-shrink: 0;
                padding: 7px 14px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: var(--surface);
                color: var(--muted);
                font-family: "JetBrains Mono", monospace;
                font-size: 11px;
                cursor: pointer;
                transition: all 0.15s;
                white-space: nowrap;
            }
            .phase-btn.active {
                font-weight: 700;
            }

            /* Phase header */
            .phase-header {
                padding: 16px;
                border-radius: 12px;
                border: 1px solid transparent;
                border-left-width: 3px;
                margin-bottom: 12px;
                background: var(--surface);
            }
            .phase-header .ph-title {
                font-family: "Unbounded", sans-serif;
                font-size: 16px;
                font-weight: 700;
            }
            .phase-header .ph-focus {
                font-size: 11px;
                color: var(--muted);
                margin-top: 4px;
            }
            .phase-header .ph-km {
                font-size: 22px;
                font-weight: 700;
                text-align: right;
            }
            .phase-header .ph-label {
                font-size: 10px;
                color: var(--muted);
                text-align: right;
            }
            .ph-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            /* Week cards */
            .week-card {
                margin-bottom: 8px;
                border-radius: 12px;
                overflow: hidden;
                border: 1px solid var(--border);
            }
            .week-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 14px 16px;
                background: var(--surface);
                cursor: pointer;
                -webkit-user-select: none;
                user-select: none;
            }
            .week-num {
                width: 28px;
                height: 28px;
                border-radius: 6px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                font-weight: 700;
                margin-right: 12px;
                flex-shrink: 0;
            }
            .week-label {
                font-size: 13px;
                color: var(--text);
            }
            .week-km {
                font-size: 13px;
                font-weight: 600;
                margin-right: 10px;
            }
            .week-chevron {
                font-size: 14px;
                color: var(--subtle);
                transition: transform 0.2s;
            }
            .week-chevron.open {
                transform: rotate(180deg);
            }
            .week-left {
                display: flex;
                align-items: center;
            }
            .week-right {
                display: flex;
                align-items: center;
            }

            /* Day rows */
            .week-body {
                background: #09090e;
                border-top: 1px solid var(--border);
            }
            .day-row {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                padding: 10px 14px;
                border-bottom: 1px solid #111;
                gap: 10px;
            }
            .day-row:last-child {
                border-bottom: none;
            }
            .day-label {
                font-size: 11px;
                color: var(--muted);
                min-width: 55px;
                padding-top: 2px;
                flex-shrink: 0;
            }
            .day-info {
                flex: 1;
            }
            .day-name {
                font-size: 12px;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
            }
            .type-badge {
                font-size: 9px;
                padding: 2px 6px;
                border-radius: 4px;
                background: #1e293b;
                color: #94a3b8;
                border: 1px solid #2a2a3a;
            }
            .day-note {
                font-size: 11px;
                color: var(--muted);
                margin-top: 3px;
            }
            .day-km {
                font-size: 13px;
                font-weight: 600;
                white-space: nowrap;
                flex-shrink: 0;
            }

            /* Tip */
            .week-tip {
                padding: 10px 14px;
                font-size: 11px;
                color: #94a3b8;
                font-style: italic;
                border-top: 1px solid #111;
            }

            /* Exercise cards */
            .ex-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 14px;
                margin-bottom: 10px;

            .ex-header {

                align-items: flex-start;

            .ex-left {

            .ex-icon-name {

                gap: 10px;

            .ex-icon {

            .ex-name {

                font-weight: 700;

            .ex-equip {

                padding: 2px 7px;
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 4px;
                color: #94a3b8;
            }
            .ex-tip {
                font-size: 11px;
                color: var(--muted);
                margin-bottom: 4px;
                line-height: 1.5;
            }
            .ex-prog {
                font-size: 10px;
                color: var(--subtle);
                font-style: italic;
            }
            .ex-right {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 8px;
                min-width: 100px;
            }
            .ex-sets {
                font-size: 11px;
                color: var(--blue);
                text-align: right;
            }
            .yt-btn {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                background: #1a0a0a;
                border: 1px solid #991b1b;
                border-radius: 6px;
                padding: 6px 10px;
                color: var(--red);
                font-size: 11px;
                text-decoration: none;
                font-family: "JetBrains Mono", monospace;
                white-space: nowrap;
                -webkit-touch-callout: default;
            }

            /* Back protocol */
            .back-section {
                margin-top: 20px;
                margin-bottom: 16px;
            }
            .back-toggle {
                width: 100%;
                background: var(--surface);
                border: 1px solid rgba(127, 29, 29, 0.4);
                border-radius: 12px;
                padding: 14px 16px;
                cursor: pointer;
                display: flex;
                justify-content: space-between;
                align-items: center;
                color: #fca5a5;
                font-family: "JetBrains Mono", monospace;
                font-size: 12px;
                text-align: left;
            }
            .back-toggle .chevron {
                font-size: 14px;
                color: var(--subtle);
                transition: transform 0.2s;
            }
            .back-toggle .chevron.open {
                transform: rotate(180deg);
            }
            .back-body {
                background: #09090e;
                border: 1px solid rgba(127, 29, 29, 0.3);
                border-top: none;
                border-radius: 0 0 12px 12px;
                padding: 10px 12px;
            }
            .back-tip {
                padding: 8px 10px;
                margin-bottom: 6px;
                background: var(--surface);
                border-radius: 8px;
                border: 1px solid var(--border);
                font-size: 11px;
                color: #94a3b8;
                line-height: 1.6;
            }
            .back-tip:last-child {
                margin-bottom: 0;
            }

            /* Progress bar */
            .progress-section {
                margin: 20px 0 16px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 16px;
            }
            .progress-label {
                font-size: 10px;
                color: var(--muted);
                margin-bottom: 12px;
                letter-spacing: 0.06em;
            }
            .bar-container {
                display: flex;
                gap: 3px;
                align-items: flex-end;
                height: 80px;
            }
            .bar {
                flex: 1;
                border-radius: 2px;
            }
            .month-labels {
                display: flex;
                justify-content: space-between;
                margin-top: 6px;
                font-size: 10px;
                color: #374151;
            }

            /* Offline banner */
            #offline-banner {
                display: none;
                position: fixed;
                top: calc(var(--safe-top) + 60px);
                left: 16px;
                right: 16px;
                background: #7f1d1d;
                color: #fca5a5;
                font-size: 11px;
                padding: 10px 14px;
                border-radius: 8px;
                text-align: center;
                z-index: 200;
            }

            /* Add to home screen hint */
            .install-hint {
                margin: 0 0 16px;
                padding: 12px 14px;
                background: #0d1117;
                border: 1px solid #1e3a5f;
                border-left: 3px solid var(--blue);
                border-radius: 10px;
                font-size: 11px;
                color: #64748b;
                line-height: 1.6;
                display: none;
            }
            .install-hint b {
                color: #93c5fd;
            }
            .install-hint.show {
                display: block;
            }

            /* Animations */
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .fade-in {
                animation: fadeIn 0.25s ease;
            }

            /* Touch feedback */
            .week-header:active,
            .phase-btn:active,
            .back-toggle:active,
            .nav-btn:active {
                opacity: 0.7;
            }

            /* Splash screen */
            #splash {
                position: fixed;
                inset: 0;
                z-index: 999;
                background: #0a0a0f;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transition:
                    opacity 0.5s ease,
                    transform 0.5s ease;
            }
            #splash.hide {
                opacity: 0;
                transform: scale(1.04);
                pointer-events: none;
            }
            .splash-icon {
                font-size: 72px;
                margin-bottom: 28px;
                animation: splashBike 1s ease-in-out infinite alternate;
            }
            @keyframes splashBike {
                from {
                    transform: translateX(-10px);
                }
                to {
                    transform: translateX(10px);
                }
            }
            .splash-title {
                font-family: "Unbounded", sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                letter-spacing: -0.5px;
                margin-bottom: 6px;
                text-align: center;
            }
            .splash-sub {
                font-size: 11px;
                color: #475569;
                letter-spacing: 0.08em;
                text-align: center;
                margin-bottom: 48px;
            }
            .splash-bar-wrap {
                width: 140px;
                height: 2px;
                background: #1e1e2e;
                border-radius: 2px;
                overflow: hidden;
            }
            .splash-bar {
                height: 100%;
                width: 0;
                border-radius: 2px;
                background: linear-gradient(
                    90deg,
                    #4ade80,
                    #60a5fa,
                    #f97316,
                    #e879f9
                );
                animation: splashLoad 1.4s ease-in-out forwards;
            }
            @keyframes splashLoad {
                0% {
                    width: 0%;
                }
                60% {
                    width: 80%;
                }
                100% {
                    width: 100%;
                }
            }
            .splash-route {
                margin-top: 20px;
                font-size: 11px;
                color: #334155;
                letter-spacing: 0.1em;
            }
        </style>
    </head>
